spring:
  application:
    name: dispatch-service

  datasource:
    url: jdbc:h2:file:./data/dispatch-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

dispatch:
  retry:
    fixed-delay-ms: 10000
    max-attempts: 5
  carrier:
    simulated-latency-min-ms: 50
    simulated-latency-max-ms: 250
  idempotency:
    retention-minutes: 30

logging:
  level:
    root: INFO
    com.acmelogistics.dispatch: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
