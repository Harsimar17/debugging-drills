# Server
server.port=8080

# Spring Application
spring.application.name=vantage-rewards

# Datasource
spring.datasource.url=jdbc:h2:mem:vantage;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization
spring.sql.init.mode=always

# Vantage Rewards
vantage.rewards.base-earn-rate=1.00
vantage.rewards.redemption-conversion-rate=3
vantage.rewards.points-validity-months=12
vantage.rewards.expiry-grace-days=0

# Logging
logging.level.com.vantage.loyalty=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE