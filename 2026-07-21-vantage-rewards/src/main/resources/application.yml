server:
  port: 8080

spring:
  application:
    name: vantage-rewards
  datasource:
    url: jdbc:h2:mem:vantage;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

vantage:
  rewards:
    # Points earned per currency unit spent, before tier multipliers.
    base-earn-rate: 1.00
    # Points required to redeem one currency unit of value.
    redemption-conversion-rate: 3
    # How long earned points remain valid.
    points-validity-months: 12
    # Grace applied before flagging points as expired in the nightly sweep.
    expiry-grace-days: 0

logging:
  level:
    com.vantage.loyalty: INFO
    org.hibernate.SQL: WARN
