server:
  port: 8080

spring:
  application:
    name: claimsflow-service

  datasource:
    url: jdbc:h2:mem:claimsflow;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    root: INFO
    com.claimsflow: DEBUG
    org.hibernate.SQL: WARN
