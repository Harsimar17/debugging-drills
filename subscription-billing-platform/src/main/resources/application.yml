server:
  port: 8080

spring:
  application:
    name: subscription-billing-platform

  datasource:
    url: jdbc:h2:mem:billingdb;DB_CLOSE_DELAY=-1;MODE=LEGACY
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: always

logging:
  level:
    root: INFO
    com.acme.billing: DEBUG
